syntax = "proto3";

package argusnet.v1;

message Vector3 {
  double x_m = 1;
  double y_m = 2;
  double z_m = 3;
}

message TrackerConfig {
  uint32 min_observations = 1;
  uint32 max_stale_steps = 2;
  bool retain_history = 3;
  double min_confidence = 4;
  double max_bearing_std_rad = 5;
  double max_timestamp_skew_s = 6;
  double min_intersection_angle_deg = 7;
  string data_association_mode = 8;
  double cv_process_accel_std = 9;
  double ct_process_accel_std = 10;
  double ct_turn_rate_std = 11;
  uint32 innovation_window = 12;
  double innovation_scale_factor = 13;
  double innovation_max_scale = 14;
  bool adaptive_measurement_noise = 15;
  double chi_squared_gate_threshold = 16;
  double cluster_distance_threshold_m = 17;
  double near_parallel_rejection_angle_deg = 18;
  uint32 confirmation_m = 19;
  uint32 confirmation_n = 20;
  uint32 max_coast_frames = 21;
  double max_coast_seconds = 22;
  double min_quality_score = 23;
}

message NodeState {
  string node_id = 1;
  Vector3 position = 2;
  Vector3 velocity = 3;
  bool is_mobile = 4;
  double timestamp_s = 5;
  double health = 6;
  string sensor_type = 7;       // e.g. "optical", "thermal", "radar"
  double fov_half_angle_deg = 8; // 0 = unset (use platform default 180)
  double max_range_m = 9;        // 0 = unset (use platform default unlimited)
}

message BearingObservation {
  string node_id = 1;
  string target_id = 2;
  Vector3 origin = 3;
  Vector3 direction = 4;
  double bearing_std_rad = 5;
  double timestamp_s = 6;
  double confidence = 7;
}

message ObservationRejection {
  string node_id = 1;
  string target_id = 2;
  double timestamp_s = 3;
  string reason = 4;
  string detail = 5;
  optional Vector3 origin = 6;
  optional Vector3 attempted_point = 7;
  optional Vector3 closest_point = 8;
  string blocker_type = 9;
  optional double first_hit_range_m = 10;
}

message TruthState {
  string target_id = 1;
  Vector3 position = 2;
  Vector3 velocity = 3;
  double timestamp_s = 4;
}

message TrackState {
  string track_id = 1;
  double timestamp_s = 2;
  Vector3 position = 3;
  Vector3 velocity = 4;
  repeated double covariance_row_major = 5;
  double measurement_std_m = 6;
  uint32 update_count = 7;
  uint32 stale_steps = 8;
  optional string lifecycle_state = 9;
  optional double quality_score = 10;
  repeated double acceleration_mps2 = 11;  // [ax, ay, az]
  double confidence = 12;
  double mode_probability_cv = 13;
  double last_seen_s = 14;
  repeated string contributing_nodes = 15;
}

message PlatformMetrics {
  optional double mean_error_m = 1;
  optional double max_error_m = 2;
  uint32 active_track_count = 3;
  uint32 observation_count = 4;
  uint32 accepted_observation_count = 5;
  uint32 rejected_observation_count = 6;
  optional double mean_measurement_std_m = 7;
  map<string, double> track_errors_m = 8;
  map<string, uint32> rejection_counts = 9;
  map<string, uint32> accepted_observations_by_target = 10;
  map<string, uint32> rejected_observations_by_target = 11;
}

message PlatformFrame {
  double timestamp_s = 1;
  repeated NodeState nodes = 2;
  repeated BearingObservation observations = 3;
  repeated ObservationRejection rejected_observations = 4;
  repeated TrackState tracks = 5;
  repeated TruthState truths = 6;
  PlatformMetrics metrics = 7;
  repeated ObservationRejection generation_rejections = 8;
}

message IngestFrameRequest {
  double timestamp_s = 1;
  repeated NodeState node_states = 2;
  repeated BearingObservation observations = 3;
  repeated TruthState truths = 4;
}

message IngestFrameResponse {
  PlatformFrame frame = 1;
}

message LatestFrameRequest {}

message LatestFrameResponse {
  optional PlatformFrame frame = 1;
}

message ResetRequest {}

message ResetResponse {}

message GetConfigRequest {}

message GetConfigResponse {
  TrackerConfig config = 1;
}

message HealthRequest {}

message LatencyHistogram {
  uint64 sample_count = 1;
  double p50_s = 2;
  double p95_s = 3;
  double p99_s = 4;
  double max_s = 5;
}

message NodeHealthMetrics {
  string node_id = 1;
  double last_seen_s = 2;
  double observation_rate_hz = 3;
  double mean_latency_s = 4;
  uint32 accepted_count = 5;
  uint32 rejected_count = 6;
  double health_score = 7;
}

message HealthResponse {
  string status = 1;
  string started_at_utc = 2;
  uint64 processed_frame_count = 3;
  repeated NodeHealthMetrics node_health = 4;
  double mean_frame_rate_hz = 5;
  double mean_ingest_latency_s = 6;
  uint32 active_node_count = 7;
  uint32 stale_node_count = 8;
  LatencyHistogram ingest_latency = 9;
}

// ---------------------------------------------------------------------------
// Mission zone messages (Phase 6.2)
// ---------------------------------------------------------------------------

message MissionZone {
  string zone_id = 1;
  string zone_type = 2;   // "exclusion", "objective", "patrol", "surveillance"
  Vector3 center = 3;
  double radius_m = 4;
  int32 priority = 5;
  string label = 6;
}

message MissionZoneUpdate {
  repeated MissionZone zones = 1;
  double timestamp_s = 2;
}

message MissionStatusRequest {
  string scenario_name = 1;
}

message MissionStatusResponse {
  string scenario_name = 1;
  double elapsed_s = 2;
  uint32 active_track_count = 3;
  uint32 active_zone_count = 4;
  repeated MissionZone zones = 5;
  repeated string active_track_ids = 6;
}

service WorldModelService {
  rpc IngestFrame(IngestFrameRequest) returns (IngestFrameResponse);
  rpc TrackStream(stream IngestFrameRequest) returns (stream IngestFrameResponse);
  rpc LatestFrame(LatestFrameRequest) returns (LatestFrameResponse);
  rpc Reset(ResetRequest) returns (ResetResponse);
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc MissionStatus(MissionStatusRequest) returns (MissionStatusResponse);
}
