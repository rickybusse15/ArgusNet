name: Nightly Benchmarks

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev
      - name: Install Python dependencies
        run: pip install -e ".[dev]"
      - name: Rust criterion benchmarks
        run: cargo bench --workspace
      - name: Python slow benchmark suite
        run: argusnet benchmark --suite slow --seeds 7,42,137,9999,31415 --output bench-out/
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-bench
          path: |
            bench-out/
            target/criterion/
      # TODO: after a week of clean nightly runs, wire red-threshold detection
      # to `gh issue create --label perf-regression`.
