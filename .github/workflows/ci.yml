name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check src/ tests/
      - name: Format check with ruff
        run: ruff format --check src/ tests/
      - name: Type check with mypy
        run: mypy src/argusnet/ --ignore-missing-imports --follow-imports=skip
      - name: Run tests
        run: python -m pytest tests/ -q --timeout=120
      - name: Fast benchmark smoke
        run: python -m pytest tests/benchmarks/ -q -m benchmark_fast --benchmark-only --benchmark-json=bench.json
      - name: Compare against golden
        env:
          ARGUSNET_RUN_PERF_REGRESSION: "1"
        run: python -m pytest tests/test_performance_regression.py -q
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-${{ matrix.python-version }}
          path: bench.json

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
      - name: Benchmark compile check
        run: cargo bench --workspace --no-run
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Format check
        run: cargo fmt --all -- --check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit bandit
      # New scanners are non-blocking until an initial pass has triaged any
      # existing findings; flip to blocking (drop continue-on-error) once clean.
      - name: pip-audit (dependency vulnerabilities)
        continue-on-error: true
        run: pip-audit
      - name: bandit (Python static analysis)
        continue-on-error: true
        run: bandit -r src/ -x src/argusnet/v1
      - name: cargo audit (Rust dependency vulnerabilities)
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked
          cargo audit
      - name: gitleaks (secret scanning)
        continue-on-error: true
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
