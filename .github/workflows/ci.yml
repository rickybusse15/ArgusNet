name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check src/ tests/
      - name: Format check with ruff
        run: ruff format --check src/ tests/
      - name: Type check with mypy
        run: mypy src/argusnet/ --ignore-missing-imports --follow-imports=skip
      - name: Run tests
        run: python -m pytest tests/ -q --timeout=120
      - name: Fast benchmark smoke
        run: python -m pytest tests/benchmarks/ -q -m benchmark_fast --benchmark-only --benchmark-json=bench.json
      - name: Compare against golden
        env:
          ARGUSNET_RUN_PERF_REGRESSION: "1"
        run: python -m pytest tests/test_performance_regression.py -q
      - uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.python-version }}
          path: bench.json

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
      - name: Benchmark compile check
        run: cargo bench --workspace --no-run
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Format check
        run: cargo fmt --all -- --check
